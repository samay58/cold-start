name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint -- --max-warnings=0
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run eval:golden -- --dry-run --limit 12
      - run: npm run knip
      - run: npm run secrets:check
      - run: npm run audit:deps
