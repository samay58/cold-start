services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coldstart
      POSTGRES_USER: coldstart
      POSTGRES_PASSWORD: local
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - cold_start_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldstart -d coldstart"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cold_start_postgres:
