project: cold-start
generated: 2026-06-05

napkin_sketch: |
  Browser or curl asks for one company
    POST /api/generate -> normalize the domain -> choose basics or one research section
    queue a generation run -> Inngest worker starts -> write run events
    fetch cheap sources first -> add paid fallback only when needed
    extract cited facts -> merge provider facts -> patch thin blocks
    validate citations -> build one stored card -> persist evidence, sources, and TTLs
    public page reads that stored card -> strips synthesis -> renders the catalogue card
    extension reads the full stored card -> shows profile, source counts, and section states
    click one research card -> gather stored evidence -> LLM writes one section
    save the section or mark it empty -> panel updates in place
    trace table explains what happened -> costs, sources, citations, and failures are inspectable

