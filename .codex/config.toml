approval_policy = "on-request"
model = "gpt-5.4"
model_reasoning_effort = "high"
project_root_markers = [".git", "CLAUDE.md"]
sandbox_mode = "workspace-write"
service_tier = "fast"

[model_providers.sakana]
name = "Sakana API"
base_url = "https://api.sakana.ai/v1"
env_key = "SAKANA_API_KEY"
wire_api = "responses"

[profiles.fugu]
model = "fugu-mini"
model_reasoning_effort = "high"
